name: Fetch BaT Auction Data
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch BaT completed auctions
        run: |
          node scripts/fetch-bat-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auctions.json
          git diff --cached --quiet || git commit -m "chore: update auction data $(date -u +%Y-%m-%d)"
          git push
